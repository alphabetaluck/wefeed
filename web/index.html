<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>信息流 - 阅读摘要</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500&family=Noto+Sans+SC:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --parchment: #f5f4ed;
      --ivory: #faf9f5;
      --white: #ffffff;
      --warm-sand: #e8e6dc;
      --dark-surface: #30302e;
      --deep-dark: #141413;
      --anthropic-near-black: #141413;
      --charcoal-warm: #4d4c48;
      --olive-gray: #5e5d59;
      --stone-gray: #87867f;
      --warm-silver: #b0aea5;
      --border-cream: #f0eee6;
      --border-warm: #e8e6dc;
      --terracotta: #c96442;
      --coral: #d97757;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans SC", Arial, sans-serif;
      font-size: 16px;
      line-height: 1.60;
      color: var(--anthropic-near-black);
      background: var(--parchment);
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    header {
      position: sticky;
      top: 0;
      background: var(--parchment);
      border-bottom: 1px solid var(--border-cream);
      padding: 16px 0;
      z-index: 100;
    }

    .header-content {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-family: "Noto Serif SC", Georgia, serif;
      font-size: 24px;
      font-weight: 500;
      color: var(--anthropic-near-black);
      letter-spacing: -0.02em;
    }

    .date-filter {
      display: flex;
      gap: 8px;
    }

    .date-filter button {
      font-family: "Noto Sans SC", Arial, sans-serif;
      font-size: 14px;
      padding: 6px 12px;
      border: 1px solid var(--border-warm);
      border-radius: 8px;
      background: var(--warm-sand);
      color: var(--charcoal-warm);
      cursor: pointer;
      transition: all 0.15s ease;
    }

    .date-filter button:hover {
      background: var(--white);
      box-shadow: 0 0 0 1px var(--border-warm);
    }

    .date-filter button.active {
      background: var(--anthropic-near-black);
      color: var(--warm-silver);
      border-color: var(--dark-surface);
    }

    main {
      padding: 40px 0 80px;
    }

    .feed-header {
      margin-bottom: 40px;
    }

    .feed-title {
      font-family: "Noto Serif SC", Georgia, serif;
      font-size: 36px;
      font-weight: 500;
      line-height: 1.20;
      color: var(--anthropic-near-black);
      margin-bottom: 12px;
    }

    .feed-subtitle {
      font-size: 17px;
      color: var(--olive-gray);
      line-height: 1.60;
    }

    .feed-item {
      background: var(--ivory);
      border: 1px solid var(--border-cream);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      transition: all 0.2s ease;
    }

    .feed-item:hover {
      box-shadow: 0 4px 24px rgba(0,0,0,0.05);
    }

    .feed-source {
      font-family: "Noto Sans SC", Arial, sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12px;
      text-transform: uppercase;
      color: var(--stone-gray);
      margin-bottom: 8px;
    }

    .feed-item-title {
      font-family: "Noto Serif SC", Georgia, serif;
      font-size: 20px;
      font-weight: 500;
      line-height: 1.30;
      color: var(--anthropic-near-black);
      margin-bottom: 12px;
    }

    .feed-source-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      color: var(--terracotta);
      text-decoration: none;
      margin-bottom: 12px;
      transition: color 0.15s ease;
    }

    .feed-source-link:hover {
      color: var(--coral);
    }

    .feed-source-link::after {
      content: "↗";
      font-size: 12px;
    }

    .feed-summary {
      font-size: 16px;
      line-height: 1.70;
      color: var(--olive-gray);
    }

    .summary-item {
      padding: 12px 0;
      border-bottom: 1px solid var(--border-cream);
    }

    .summary-item:last-child {
      border-bottom: none;
    }

    .summary-item h2, .summary-item h3, .summary-item h4 {
      font-family: "Noto Serif SC", Georgia, serif;
      font-weight: 500;
      margin: 16px 0 8px;
      color: var(--anthropic-near-black);
    }

    .summary-item h2 { font-size: 20px; }
    .summary-item h3 { font-size: 18px; }
    .summary-item h4 { font-size: 16px; }

    .summary-item strong {
      color: var(--anthropic-near-black);
      font-weight: 500;
    }

    .summary-item em {
      font-style: italic;
    }

    .summary-item code {
      font-family: "SF Mono", "Monaco", monospace;
      font-size: 14px;
      background: var(--warm-sand);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--terracotta);
    }

    .summary-item a {
      color: var(--terracotta);
      text-decoration: none;
    }

    .summary-item a:hover {
      text-decoration: underline;
    }

    .summary-item blockquote {
      border-left: 3px solid var(--terracotta);
      padding-left: 12px;
      margin: 12px 0;
      color: var(--stone-gray);
      font-style: italic;
    }

    .summary-item ul {
      margin: 8px 0;
      padding-left: 20px;
    }

    .summary-item li {
      margin: 4px 0;
    }

    .summary-item input[type="checkbox"] {
      margin-right: 8px;
    }

    .feed-summary p {
      margin-bottom: 12px;
    }

    .feed-summary p:last-child {
      margin-bottom: 0;
    }

    .feed-meta {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid var(--border-cream);
    }

    .feed-tag {
      font-size: 12px;
      color: var(--stone-gray);
    }

    .feed-date {
      font-size: 12px;
      color: var(--stone-gray);
    }

    .section-divider {
      width: 100%;
      height: 1px;
      background: var(--border-warm);
      margin: 48px 0;
    }

    .empty-state {
      text-align: center;
      padding: 80px 24px;
      color: var(--stone-gray);
    }

    .empty-state p {
      font-size: 17px;
    }

    footer {
      border-top: 1px solid var(--border-cream);
      padding: 24px 0;
    }

    .github-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--stone-gray);
      text-decoration: none;
      transition: color 0.15s ease;
    }

    .github-link:hover {
      color: var(--anthropic-near-black);
    }

    @media (max-width: 640px) {
      .feed-title {
        font-size: 28px;
      }

      .feed-item {
        padding: 20px;
        border-radius: 12px;
      }

      .feed-item-title {
        font-size: 18px;
      }

      .header-content {
        flex-direction: column;
        gap: 12px;
      }

      .logo {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <div class="header-content">
        <div class="logo">阅读摘要</div>
        <div class="date-filter" id="dateFilter">
          <button data-date="all" class="active">全部</button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <div class="container">
      <div class="feed-header">
        <h1 class="feed-title">今日阅读</h1>
        <p class="feed-subtitle">每天读过文章的摘要整理</p>
      </div>

      <div id="feedList">
        <div class="empty-state">
          <p>暂无内容</p>
        </div>
      </div>
    </div>
  </main>

  <footer>
    <div class="container">
      <a href="https://github.com/alphabetaluck/wefeed" class="github-link" target="_blank" rel="noopener">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.744 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/></svg>
        开源地址
      </a>
    </div>
  </footer>

  <script>
    let articles = [];

    function parseMd(text) {
      if (!text) return '';
      return text
        .replace(/^### (.+)$/gm, '<h4>$1</h4>')
        .replace(/^## (.+)$/gm, '<h3>$1</h3>')
        .replace(/^# (.+)$/gm, '<h2>$1</h2>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/__([^_]+)__/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^[\*-] (.+)$/gm, '<li>$1</li>')
        .replace(/^(\d+)\. (.+)$/gm, '<li>$2</li>')
        .replace(/^\[(x| )\](.+)$/gm, '<label><input type="checkbox" $1 disabled>$2</label>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br>');
    }

    async function loadArticles() {
      try {
        const res = await fetch('/api/articles');
        articles = await res.json();
        initDateFilter();
        renderFeed(articles);
      } catch (e) {
        console.error(e);
      }
    }

    function renderFeed(items) {
      const feedList = document.getElementById('feedList');
      
      if (!items || items.length === 0) {
        feedList.innerHTML = '<div class="empty-state"><p>暂无内容</p></div>';
        return;
      }

      let html = '';
      items.forEach((item, index) => {
        if (index > 0 && item.date !== items[index - 1].date) {
          html += '<div class="section-divider"></div>';
        }

        const bodyHtml = parseMd(item.content || '');
        const tagsHtml = (item.tags || []).map(t =>
          `<span class="feed-tag">${t}</span>`
        ).join('');
        const urlHtml = item.url
          ? `<a href="${item.url}" class="feed-source-link" target="_blank" rel="noopener">原文链接</a>`
          : '';

        html += `
          <article class="feed-item">
            <div class="feed-source">${item.source || '未知来源'}</div>
            <h2 class="feed-item-title">${item.title}</h2>
            ${urlHtml}
            <div class="feed-summary"><div class="summary-item">${bodyHtml}</div></div>
            <div class="feed-meta">
              ${tagsHtml}
              <span class="feed-date">${item.date}</span>
            </div>
          </article>
        `;
      });

      feedList.innerHTML = html;
    }

    function initDateFilter() {
      const dates = [...new Set(articles.map(a => a.date))].sort().reverse();
      const filterContainer = document.getElementById('dateFilter');
      filterContainer.innerHTML = '<button data-date="all" class="active">全部</button>';
      
      dates.forEach(date => {
        const btn = document.createElement('button');
        btn.textContent = date;
        btn.dataset.date = date;
        filterContainer.appendChild(btn);
      });

      filterContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
          filterContainer.querySelectorAll('button').forEach(b => b.classList.remove('active'));
          e.target.classList.add('active');
          
          const selectedDate = e.target.dataset.date;
          if (selectedDate === 'all') {
            renderFeed(articles);
          } else {
            renderFeed(articles.filter(a => a.date === selectedDate));
          }
        }
      });
    }

    loadArticles();
  </script>
</body>
</html>
